<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex">
<title>운영 허브 — FINDIER LAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --lime: #D3F45A; --purple: #7B61FF; --black: #111111; color-scheme: light; }
body {
  font-family: 'Pretendard', 'Inter', sans-serif;
  background: var(--black);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.login-wrap {
  width: 100%;
  max-width: 440px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 56px;
}
.logo-text {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: .18em;
  color: #fff;
  text-transform: uppercase;
}
.login-title {
  font-family: 'Inter', sans-serif;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -.03em;
  margin-bottom: 8px;
}
.login-sub {
  font-size: 15px;
  color: rgba(255,255,255,.4);
  margin-bottom: 48px;
  line-height: 1.6;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}
.form-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  color: rgba(255,255,255,.35);
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  color: #fff;
  font-family: 'Pretendard', sans-serif;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 20px;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: var(--lime);
}
.form-input::placeholder {
  color: rgba(255,255,255,.2);
}
.login-btn {
  width: 100%;
  background: var(--lime);
  color: var(--black);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 18px;
  border: none;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity .2s;
}
.login-btn:hover { opacity: .85; }
.error-msg {
  display: none;
  font-size: 13px;
  color: #FF6B6B;
  margin-top: 12px;
  padding: 12px 16px;
  background: rgba(255,107,107,.1);
  border-left: 3px solid #FF6B6B;
}
.error-msg.show { display: block; }
.back-link {
  display: block;
  text-align: center;
  margin-top: 40px;
  font-size: 13px;
  color: rgba(255,255,255,.25);
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: rgba(255,255,255,.5); }

    /* CUSTOM CURSOR */
    .cursor-dot {
      position: fixed; top: 0; left: 0; width: 8px; height: 8px;
      border-radius: 50%; background: #7B61FF;
      pointer-events: none; z-index: 9999;
      opacity: 0; transform: translate(-50%, -50%) scale(1);
      transition: opacity .2s ease, transform .25s ease;
    }
    .cursor-dot.visible { opacity: .55; }
    .cursor-dot.hover { transform: translate(-50%, -50%) scale(3.75); opacity: .16; }
    @media (hover: none), (max-width: 768px) {
      .cursor-dot { display: none; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 34 34" fill="none">
      <circle cx="10" cy="9.5" r="4.5" fill="#D3F45A"/>
      <path d="M17 5 L28 5 L28 20" stroke="#7B61FF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6.5 21 Q10.5 29.5 20 27" stroke="#fff" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="logo-text">Findier Lab</span>
  </div>

  <h1 class="login-title">운영 허브</h1>
  <p class="login-sub">파인디어랩 클라이언트 전용 공간입니다.<br>전달받은 이메일과 비밀번호를 입력해주세요.</p>

  <div class="form-group">
    <label class="form-label" for="email">이메일</label>
    <input
      type="email"
      id="email"
      class="form-input"
      placeholder="이메일 입력"
      autocomplete="email"
    >
  </div>

  <div class="form-group" style="margin-top:12px;">
    <label class="form-label" for="password">비밀번호</label>
    <input
      type="password"
      id="password"
      class="form-input"
      placeholder="비밀번호 입력"
      autocomplete="current-password"
    >
  </div>

  <button class="login-btn" onclick="doLogin()">입장하기 →</button>
  <div class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않습니다.</div>

  <a href="../index.html" class="back-link">← 파인디어랩 홈으로</a>
</div>

<script>
  const _sb = window.supabase.createClient(
    'https://gfpmdrhpyclkkfkraojq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmcG1kcmhweWNsa2tma3Jhb2pxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNDA5NzAsImV4cCI6MjA5NzkxNjk3MH0.GZuxspwG-s1Z3lD5GCGhWDuYXt8cfChD56xrTQqbXC0'
  );

  // 이미 로그인된 경우 바로 진입
  _sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    const btn = document.querySelector('.login-btn');

    btn.disabled = true;
    btn.textContent = '확인 중...';

    const { error } = await _sb.auth.signInWithPassword({ email, password });

    if (error) {
      err.classList.add('show');
      document.getElementById('password').style.borderColor = '#FF6B6B';
      btn.disabled = false;
      btn.textContent = '입장하기 →';
    } else {
      window.location.href = 'index.html';
    }
  }

  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  ['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('password').style.borderColor = '';
    });
  });
</script>

<div class="cursor-dot" id="cursorDot"></div>
<script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
<script>
(function(){
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isTouch = window.matchMedia('(hover: none)').matches;

  if (!reduceMotion && !isTouch && typeof Lenis !== 'undefined') {
    const lenis = new Lenis({ duration: 1.0, easing: (t) => 1 - Math.pow(1 - t, 3) });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
  }

  if (!reduceMotion && !isTouch) {
    const dot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', (e) => {
      dot.classList.add('visible');
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => dot.classList.remove('visible'));
    document.querySelectorAll('a, button').forEach((el) => {
      el.addEventListener('mouseenter', () => dot.classList.add('hover'));
      el.addEventListener('mouseleave', () => dot.classList.remove('hover'));
    });
  }
})();
</script>
</body>
</html>
